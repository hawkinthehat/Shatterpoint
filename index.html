<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SXT’EKW | Neural Weaver</title>
    <style>
        :root { --bg: #020617; --teal: #2dd4bf; --text: #f1f5f9; --red: #f43f5e; --gold: #fbbf24; --cedar: #78350f; --mist: #64748b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; margin: 0; overflow: hidden; touch-action: none; text-align: center; height: 100vh; }
        
        .screen { display: none; height: 100vh; width: 100vw; flex-direction: column; justify-content: center; align-items: center; position: absolute; padding: 30px; z-index: 5; }
        .active { display: flex; animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .btn { background: var(--teal); color: var(--bg); border: none; padding: 22px; border-radius: 18px; width: 100%; max-width: 360px; font-weight: 900; font-size: 1rem; margin: 10px 0; cursor: pointer; letter-spacing: 2px; text-transform: uppercase; z-index: 20; transition: 0.3s; }
        .btn:active { transform: scale(0.95); }
        .emergency { background: var(--red); color: white; box-shadow: 0 0 30px rgba(244, 63, 94, 0.4); }
        .secondary { background: none; border: 1px solid var(--cedar); color: var(--cedar); }
        
        .top-bar { position: absolute; top: 0; left: 0; width: 100%; padding: 20px; display: flex; justify-content: space-between; z-index: 1000; }
        .control-icon { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 50%; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; cursor: pointer; backdrop-filter: blur(5px); color: white; }

        canvas { position: absolute; top: 0; left: 0; z-index: 1; }
        #visual-msg { color: var(--teal); letter-spacing: 4px; z-index: 10; font-weight: 900; margin-top: 20px; text-shadow: 0 0 10px rgba(45, 212, 191, 0.5); }
        
        .weaving-pattern { opacity: 0.05; position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; background-image: repeating-linear-gradient(45deg, #fff 0, #fff 1px, transparent 0, transparent 50%); background-size: 20px 20px; }
    </style>
</head>
<body>

    <div class="weaving-pattern"></div>

    <div id="ui-overlay" style="display: none;">
        <div class="top-bar">
            <div id="vol-btn" class="control-icon" onclick="toggleAudio()">🔊</div>
            <div class="control-icon" onclick="exitAll()" style="color: var(--red);">✕</div>
        </div>
    </div>

    <div id="home" class="screen active">
        <h1 style="color: var(--teal); letter-spacing: 10px; font-weight: 900; margin-bottom: 5px;">SXT’EKW</h1>
        <p style="opacity: 0.5; font-size: 0.7rem; margin-bottom: 40px; letter-spacing: 4px;">THE QUIET | NEURAL WEAVER</p>
        
        <button class="btn emergency" onclick="startProtocol()">SYSTEM RED: RESET</button>
        <button class="btn" onclick="show('vantage')">The Vantage (Observe)</button>
        <button class="btn secondary" onclick="show('visual')">Cedar Shield (EMDR)</button>
        
        <div style="margin-top: 50px;">
            <p style="font-size: 0.8rem; opacity: 0.4;">Inspired by Coast Salish Resilience</p>
            <a href="#" style="color: var(--gold); text-decoration: none; font-weight: bold;">Support the Project ⚡</a>
        </div>
    </div>

    <div id="vantage" class="screen">
        <h2 style="color: var(--teal);">THE VANTAGE</h2>
        <p style="opacity: 0.8; max-width: 280px;">Label the worry. Watch it shatter. Watch it re-weave.</p>
        <input type="text" id="thought-input" placeholder="Worry Name..." style="background: rgba(255,255,255,0.05); border: 1px solid var(--teal); color: white; padding: 18px; border-radius: 15px; width: 85%; text-align: center; margin: 25px 0; font-size: 1.2rem;">
        <button class="btn" onclick="initVantage()">BEGIN OBSERVATION</button>
        <button class="btn secondary" onclick="show('home')">BACK</button>
    </div>

    <div id="visual" class="screen">
        <canvas id="canvas"></canvas>
        <h3 id="visual-msg">FOLLOW THE LIGHT</h3>
    </div>

    <div id="success" class="screen">
        <h1 style="color: var(--teal); letter-spacing: 4px;">SXT’EKW REACHED</h1>
        <p id="success-quote" style="font-style: italic; opacity: 0.8; max-width: 300px; line-height: 1.6;"></p>
        <button class="btn" onclick="show('home')">RETURN TO BASE</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [], mouse = { x: null, y: null }, audioCtx, isMuted = false;
        let binauralGain, leftOsc, rightOsc, vantageMode = false, shatterPoint = false;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function toggleAudio() {
            isMuted = !isMuted;
            document.getElementById('vol-btn').innerText = isMuted ? "🔇" : "🔊";
            if(binauralGain) binauralGain.gain.setTargetAtTime(isMuted ? 0 : 0.05, audioCtx.currentTime, 0.1);
        }

        function show(id) {
            initAudio();
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('ui-overlay').style.display = (id === 'home' || id === 'success') ? 'none' : 'block';
            if (id === 'visual') startVisual();
        }

        function initVantage() {
            vantageMode = true; shatterPoint = false;
            const thought = document.getElementById('thought-input').value || "Worry";
            show('visual');
            document.getElementById('visual-msg').innerText = `OBSERVE: ${thought.toUpperCase()}`;
            setTimeout(() => { shatterThought(); }, 15000); // Shatter after 15s of focus
        }

        function startVisual() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            particles = []; for (let i = 0; i < 60; i++) particles.push(new Neuron());
            
            binauralGain = audioCtx.createGain();
            binauralGain.gain.setValueAtTime(0, audioCtx.currentTime);
            binauralGain.gain.linearRampToValueAtTime(isMuted ? 0 : 0.05, audioCtx.currentTime + 2);
            binauralGain.connect(audioCtx.destination);
            
            leftOsc = audioCtx.createOscillator(); rightOsc = audioCtx.createOscillator();
            leftOsc.frequency.value = 432; // Nurture Frequency
            rightOsc.frequency.value = 442; // 10Hz Binaural Beat
            leftOsc.connect(binauralGain); rightOsc.connect(binauralGain);
            leftOsc.start(); rightOsc.start();
            animate();
        }

        function shatterThought() {
            shatterPoint = true;
            if (navigator.vibrate) navigator.vibrate([100, 50, 200]);
            document.getElementById('visual-msg').innerText = "WEAVING THE QUIET...";
            setTimeout(() => { triggerSuccess(); }, 10000);
        }

        class Neuron {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height;
                this.size = 2; this.sx = (Math.random()-0.5)*0.8; this.sy = (Math.random()-0.5)*0.8;
            }
            update() {
                this.x += this.sx; this.y += this.sy;
                if (mouse.x) {
                    let dx = mouse.x - this.x, dy = mouse.y - this.y, dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 150) {
                        let f = (150-dist)/150;
                        // ShatterPoint logic: Repel strongly then become part of the weave
                        if(shatterPoint) { this.x -= dx*f*0.5; this.y -= dy*f*0.5; }
                        else if(vantageMode) { this.x -= dx*f*0.1; this.y -= dy*f*0.1; }
                        else { this.x += dx*f*0.1; this.y += dy*f*0.1; }
                        this.alpha = 1;
                    }
                }
                if (this.x > canvas.width || this.x < 0) this.sx *= -1;
                if (this.y > canvas.height || this.y < 0) this.sy *= -1;
            }
            draw() {
                ctx.fillStyle = shatterPoint ? `rgba(251, 191, 36, ${this.alpha || 0.4})` : `rgba(45, 212, 191, ${this.alpha || 0.3})`;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
                
                // NEURAL WEAVING LOGIC
                particles.forEach(p => {
                    let d = Math.sqrt((p.x-this.x)**2 + (p.y-this.y)**2);
                    if (d < 70) {
                        ctx.strokeStyle = shatterPoint ? `rgba(120, 53, 15, ${0.2 - d/70})` : `rgba(45, 212, 191, ${0.15 - d/70})`;
                        ctx.lineWidth = 0.5; ctx.beginPath(); ctx.moveTo(this.x, this.y); ctx.lineTo(p.x, p.y); ctx.stroke();
                    }
                });
                this.alpha = 0.3;
            }
        }

        function animate() {
            if (!document.getElementById('visual').classList.contains('active')) return;
            ctx.fillStyle = 'rgba(2, 6, 23, 0.2)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        function triggerSuccess() {
            exitAll(); 
            document.getElementById('success-quote').innerText = "The weaving is complete. Your mind is like the cedar—strong, rooted, and quiet.";
            show('success');
        }

        function exitAll() {
            vantageMode = false; shatterPoint = false;
            if(leftOsc) { leftOsc.stop(); rightOsc.stop(); }
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            show('home');
        }
    </script>
</body>
</html>
