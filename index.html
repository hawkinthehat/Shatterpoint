<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA1MTIgNTEyIj48cmVjdCB3aWR0aD0iNTEyIiBoZWlnaHQ9IjUxMiIgZmlsbD0iIzBmMTcyYSIvPjxwYXRoIGQ9Ik0yNTYgMTI4IEwxMjggMzg0IEwzODQgMzg0IFoiIGZpbGw9IiMyZGQ0YmYiLz48L3N2Zz4=">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Shatterpoint</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #0f172a; touch-action: none; font-family: ui-sans-serif, system-ui; color: white; }
        canvas { display: block; }
        .ui-element { transition: opacity 0.8s ease-in-out; }
        .zen-mode .ui-element { opacity: 0 !important; pointer-events: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: #2dd4bf; cursor: pointer; border: 2px solid #0f172a; }
    </style>
</head>
<body>

    <div id="intro-overlay" class="absolute inset-0 z-50 bg-slate-950 flex flex-col items-center justify-center p-8 text-center transition-opacity duration-1000">
        <div class="max-w-md">
            <h1 class="text-teal-400 font-black text-6xl mb-2 tracking-tighter italic uppercase">Shatterpoint</h1>
            <p class="text-slate-500 text-[10px] uppercase tracking-[0.4em] mb-10">Neural Reset Protocol</p>
            
            <div class="bg-slate-900/80 border border-white/5 rounded-3xl p-6 mb-10 text-left space-y-4">
                <p class="text-slate-400 text-xs leading-relaxed">
                    Target the <span class="text-rose-500 font-bold">Red Static</span> to clear cognitive load. Every 3 levels, the geometry evolves to tax working memory.
                </p>
                <div class="grid grid-cols-2 gap-4 text-[9px] text-slate-500 uppercase tracking-widest">
                    <div>• 2 Taps: Zen Mode</div>
                    <div>• 3 Taps: Bilateral Mode</div>
                </div>
            </div>

            <button onclick="startApp()" class="w-full py-5 bg-teal-500 text-slate-950 font-black rounded-2xl hover:brightness-110 active:scale-95 transition-all uppercase tracking-[0.2em] text-sm shadow-2xl shadow-teal-500/20">
                Start 2-Min Reset
            </button>
        </div>
    </div>

    <div class="ui-element absolute top-10 left-8 z-20 flex flex-col space-y-6 opacity-40 hover:opacity-100">
        <input type="range" id="volume-control" min="0" max="1" step="0.1" value="0.5" class="w-24 h-1 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-teal-500">
        <div id="timer-display" class="text-teal-400 font-mono text-2xl tracking-tighter">02:00</div>
    </div>

    <div class="absolute top-10 w-full text-center pointer-events-none z-10 select-none">
        <h1 id="status" class="ui-element text-teal-400 font-black text-3xl tracking-widest uppercase italic opacity-60">Level 1</h1>
        <p id="mode-label" class="ui-element text-rose-500 text-[10px] font-bold uppercase tracking-[0.3em] mt-2 opacity-0">Bilateral Stimulation Active</p>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        // 1. Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(() => {});
            });
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        let fragments = [], glitches = [], isPaused = true, isZen = false, isEMDR = false;
        let calmScore = 0, pulseValue = 0, globalRotation = 0, emdrSweep = 0;
        let lastTap = 0, tapCount = 0, timeLeft = 120, timerInterval;
        let audioStarted = false, masterVol = 0.5;

        let savedData = JSON.parse(localStorage.getItem('shatterpoint_v6')) || { level: 1, totalShattered: 0 };
        const SPIRIT_THEMES = [
            { freq: 96 },
            { freq: 110 },
            { freq: 132 },
            { freq: 147 }
        ];

        let audioCtx, resOsc, resGain, panner, drumIntervalId;
        
        function getCurrentTheme() {
            return SPIRIT_THEMES[Math.floor((savedData.level - 1) / 5) % SPIRIT_THEMES.length];
        }
        
        function initAudio() {
            if (audioStarted) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            panner = audioCtx.createStereoPanner();
            panner.connect(audioCtx.destination);

            resOsc = audioCtx.createOscillator();
            resGain = audioCtx.createGain();
            const theme = getCurrentTheme();

            resOsc.type = 'sine';
            resOsc.frequency.setValueAtTime(theme.freq, audioCtx.currentTime);
            resGain.gain.value = 0;
            
            resOsc.connect(resGain).connect(panner);
            resOsc.start();
            audioStarted = true;
            startDrum();
        }

        function playDrum() {
            if (!audioCtx || !panner) return;

            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            const theme = getCurrentTheme();
            
            osc.frequency.setValueAtTime(theme.freq * 0.8, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            
            g.gain.setValueAtTime(0.3, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            
            osc.connect(g).connect(panner);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
        }

        function startDrum() {
            if (drumIntervalId) return;
            drumIntervalId = setInterval(() => {
                if (!audioStarted || isPaused || !audioCtx || audioCtx.state !== 'running') return;
                playDrum();
            }, 460);
        }

        function startApp() {
            initAudio();
            document.getElementById('intro-overlay').style.opacity = '0';
            setTimeout(() => { 
                document.getElementById('intro-overlay').classList.add('hidden'); 
                isPaused = false; 
                startTimer();
            }, 1000);
            updateHUD();
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    const mins = Math.floor(timeLeft / 60);
                    const secs = timeLeft % 60;
                    document.getElementById('timer-display').innerText = `${mins}:${secs.toString().padStart(2, '0')}`;
                } else {
                    clearInterval(timerInterval);
                    finishSession();
                }
            }, 1000);
        }

        function finishSession() {
            isPaused = true;
            alert(`Neutralization Complete. Level: ${savedData.level}. Systems Clear.`);
            location.reload(); 
        }

        function updateHUD() {
            document.getElementById('status').innerText = `Level ${savedData.level}`;
        }

        document.getElementById('volume-control').addEventListener('input', (e) => masterVol = e.target.value);

        class Fragment {
            constructor(x, y) {
                this.x = x; this.y = y; 
                this.ring = Math.floor(Math.random() * 5) + 1;
                this.angle = Math.random() * Math.PI * 2; this.radius = this.ring * 45;
                this.vx = (Math.random() - 0.5) * 35; this.vy = (Math.random() - 0.5) * 35;
                this.size = Math.random() * 3 + 1.5; this.isSnapping = false;
                this.sides = Math.floor(savedData.level / 3) + 3;
            }
            update(scale, centerX, hue) {
                if (!this.isSnapping) {
                    this.x += this.vx; this.y += this.vy; this.vx *= 0.90; this.vy *= 0.90;
                    if (Math.abs(this.vx) < 0.5) this.isSnapping = true;
                } else {
                    const step = (Math.PI * 2) / this.sides;
                    const armAngle = Math.floor(this.angle / step) * step;
                    const tx = centerX + Math.cos(armAngle + globalRotation) * (this.radius * scale);
                    const ty = (canvas.height/2) + Math.sin(armAngle + globalRotation) * (this.radius * scale);
                    this.x += (tx - this.x) * 0.08; this.y += (ty - this.y) * 0.08;
                }
                this.color = `hsla(${hue}, 70%, 55%, 0.8)`;
            }
            draw() { ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
        }

        class Glitch {
            constructor() {
                this.x = Math.random() > 0.5 ? -40 : canvas.width + 40;
                this.y = Math.random() * canvas.height;
                this.speed = 1.5 + (savedData.level * 0.08);
            }
            update(centerX) {
                const dx = centerX - this.x; const dy = (canvas.height/2) - this.y;
                const d = Math.sqrt(dx*dx + dy*dy);
                this.x += (dx/d) * this.speed; this.y += (dy/d) * this.speed;
                return d;
            }
            draw() {
                ctx.strokeStyle = '#f43f5e'; ctx.lineWidth = 1.5;
                ctx.strokeRect(this.x - 7, this.y - 7, 14, 14);
            }
        }

        function handleInput(e) {
            if (isPaused) return;
            const now = Date.now();
            if (now - lastTap < 400) {
                tapCount++;
                if (tapCount === 1) { isZen = !isZen; document.body.classList.toggle('zen-mode', isZen); }
                if (tapCount === 2) { 
                    isEMDR = !isEMDR; 
                    document.getElementById('mode-label').style.opacity = isEMDR ? '0.8' : '0';
                    if (!isEMDR && panner) panner.pan.value = 0; 
                }
            } else { tapCount = 0; }
            lastTap = now;

            const x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const y = e.clientY || (e.touches ? e.touches[0].clientY : 0);

            glitches.forEach((g, i) => {
                if (Math.sqrt((x - g.x)**2 + (y - g.y)**2) < 60) {
                    glitches.splice(i, 1);
                    calmScore = Math.min(calmScore + 12, 100);
                    savedData.totalShattered++;
                    for(let j=0; j<15; j++) fragments.push(new Fragment(x, y));
                    if (savedData.totalShattered % 15 === 0) {
                        savedData.level++;
                        updateHUD();
                        localStorage.setItem('shatterpoint_v6', JSON.stringify(savedData));
                        fragments.forEach(f => { f.isSnapping = false; f.sides = Math.floor(savedData.level / 3) + 3; });
                        if (audioStarted && audioCtx && resOsc) {
                            const theme = getCurrentTheme();
                            resOsc.frequency.setTargetAtTime(theme.freq, audioCtx.currentTime, 0.25);
                        }
                    }
                }
            });
        }

        function animate() {
            if (!isPaused) {
                ctx.fillStyle = 'rgba(15, 23, 42, 0.28)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                let centerX = canvas.width / 2;
                if (isEMDR) {
                    emdrSweep += 0.04;
                    centerX = canvas.width / 2 + Math.sin(emdrSweep) * (canvas.width * 0.4);
                    if (panner && audioCtx) {
                        const panValue = (centerX / canvas.width) * 2 - 1;
                        panner.pan.setTargetAtTime(panValue, audioCtx.currentTime, 0.1);
                    }
                } else if (panner && audioCtx) {
                    panner.pan.setTargetAtTime(0, audioCtx.currentTime, 0.1);
                }
                const norm = calmScore / 100;
                pulseValue += 0.045 - (norm * 0.02);
                const hue = 280 - (norm * 110);
                if (audioStarted) resGain.gain.setTargetAtTime((Math.sin(pulseValue) + 1) * 0.05 * norm * masterVol, audioCtx.currentTime, 0.1);
                fragments.forEach(f => { f.update(1 + Math.sin(pulseValue) * 0.18, centerX, hue); f.draw(); });
                if (Math.random() < 0.018) glitches.push(new Glitch());
                glitches.forEach((g, i) => {
                    const d = g.update(centerX); g.draw();
                    if (d < 45) { glitches.splice(i, 1); calmScore = Math.max(0, calmScore - 12); }
                });
                globalRotation += 0.006; calmScore = Math.max(0, calmScore - 0.04);
            }
            requestAnimationFrame(animate);
        }

        window.addEventListener('mousedown', handleInput);
        window.addEventListener('touchstart', (e) => { handleInput(e); e.preventDefault(); }, {passive: false});
        animate();
    </script>
</body>
</html>
