<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KW’ÉKW’E | Osprey Scout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #020617; overflow: hidden; touch-action: none; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let tomahawks = [], fragments = [], totemPoints = [];

        // 1. Osprey Totem Geometry
        function generateOspreyTotem() {
            totemPoints = [];
            const count = 1200;
            for (let i = 0; i < count; i++) {
                const t = (i / count) * Math.PI * 2;
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                totemPoints.push({ x: x * 10 + canvas.width/2, y: y * 10 + canvas.height/2 });
            }
        }

        class Tomahawk {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = -50;
                this.speed = 2 + Math.random() * 3;
            }
            update() { this.y += this.speed; }
            draw() {
                ctx.fillStyle = "#2dd4bf";
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x - 10, this.y + 30);
                ctx.lineTo(this.x + 10, this.y + 30);
                ctx.fill();
            }
        }

        class Fragment {
            constructor(x, y) {
                this.x = x; this.y = y;
                const target = totemPoints[Math.floor(Math.random() * totemPoints.length)];
                this.tx = target.x; this.ty = target.y;
                this.vx = (Math.random() - 0.5) * 20;
                this.vy = (Math.random() - 0.5) * 20;
            }
            update() {
                this.x += (this.tx - this.x) * 0.05;
                this.y += (this.ty - this.y) * 0.05;
            }
            draw() {
                ctx.fillStyle = "#2dd4bf";
                ctx.fillRect(this.x, this.y, 2, 2);
            }
        }

        function animate() {
            ctx.fillStyle = "rgba(2, 6, 23, 0.2)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            if(Math.random() < 0.05) tomahawks.push(new Tomahawk());

            tomahawks.forEach((t, i) => {
                t.update(); t.draw();
                if(t.y > canvas.height) tomahawks.splice(i, 1);
            });

            fragments.forEach(f => { f.update(); f.draw(); });
            requestAnimationFrame(animate);
        }

        window.addEventListener('mousedown', (e) => {
            tomahawks.forEach((t, i) => {
                if(Math.hypot(t.x - e.clientX, t.y - e.clientY) < 50) {
                    for(let j=0; j<30; j++) fragments.push(new Fragment(t.x, t.y));
                    tomahawks.splice(i, 1);
                }
            });
        });

        generateOspreyTotem();
        animate();
    </script>
</body>
</html>
