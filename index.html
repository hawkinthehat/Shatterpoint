    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #020617; touch-action: none; font-family: ui-sans-serif, system-ui; color: white; }
        canvas { display: block; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .ui-element { transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        input[type=range] { -webkit-appearance: none; background: rgba(255,255,255,0.1); height: 4px; border-radius: 2px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: #2dd4bf; cursor: pointer; border: 2px solid #0f172a; }
        @keyframes pulse-slow { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.05); } }
        .animate-neuro { animation: pulse-slow 4s infinite ease-in-out; }
    </style>
</head>
<body>

    <div id="intro-overlay" class="absolute inset-0 z-50 bg-slate-950 flex flex-col items-center justify-center p-6 text-center">
        <div class="max-w-md w-full flex flex-col items-center">
            <h1 id="intro-title" class="text-teal-400 font-black text-6xl mb-2 italic uppercase tracking-tighter">Spirit Path</h1>
            <p class="text-slate-500 text-[10px] uppercase tracking-[0.6em] mb-12">Neural Architecture by Momentum</p>

            <div class="grid grid-cols-2 gap-4 w-full mb-10 font-black italic">
                <div class="glass rounded-3xl p-6 border-b-4 border-teal-500/30">
                    <p class="text-slate-500 text-[9px] uppercase tracking-widest not-italic mb-1">Spirit Rank</p>
                    <p id="dash-level" class="text-teal-400 text-4xl">LVL 1</p>
                </div>
                <div class="glass rounded-3xl p-6 border-b-4 border-slate-700/30">
                    <p class="text-slate-500 text-[9px] uppercase tracking-widest not-italic mb-1">Shattered</p>
                    <p id="dash-total" class="text-white text-4xl">0</p>
                </div>
            </div>

            <button onclick="startApp()" class="w-full py-8 bg-white text-slate-900 font-black rounded-3xl active:scale-95 transition-all uppercase tracking-[0.4em] text-sm shadow-2xl">
                Initialize Reset
            </button>
        </div>
    </div>

    <div id="hud" class="ui-element opacity-0 absolute top-12 w-full flex justify-between px-10 z-20 pointer-events-none">
        <div id="timer-display" class="text-teal-400 font-mono text-5xl tracking-tighter">02:00</div>
        <div id="active-level" class="text-white font-black italic tracking-widest text-xl uppercase">Osprey | Rank 1</div>
    </div>

    <div id="controls" class="ui-element opacity-0 absolute bottom-12 w-full flex flex-col items-center gap-6 z-20">
        <div class="w-64">
            <div class="flex justify-between text-[8px] uppercase tracking-[0.3em] text-slate-500 font-bold mb-2">
                <span>Slow / Deep</span>
                <span>Fast / Sharp</span>
            </div>
            <input type="range" id="speed-slider" min="0.01" max="0.08" step="0.005" value="0.04" class="w-full">
        </div>
        <button onclick="cycleMode()" id="mode-btn" class="glass px-14 py-5 text-teal-400 rounded-full text-[11px] font-bold uppercase tracking-[0.5em] active:bg-white/10 shadow-xl border border-teal-500/20">
            Mode: STANDARD
        </button>
    </div>

    <div id="meta-overlay" class="ui-element opacity-0 pointer-events-none absolute inset-0 z-[60] bg-slate-950/95 flex flex-col items-center justify-center p-8 text-center">
        <div class="animate-neuro mb-6">
            <p id="plasticity-status" class="text-white font-black text-xs uppercase tracking-[0.5em]">Neuroplasticity Active</p>
        </div>
        <h2 class="text-white font-black text-3xl mb-2 italic uppercase">Reflection Gate</h2>
        <p class="text-slate-400 text-sm mb-10 max-w-xs mx-auto">Select the state that matches your current momentum.</p>
        
        <div class="grid grid-cols-1 gap-4 w-full max-w-sm">
            <button onclick="recordMeta('Stuck')" class="glass p-5 rounded-2xl text-rose-400 border-rose-500/20 font-black uppercase tracking-widest text-[10px]">Stuck / Frustrated</button>
            <button onclick="recordMeta('Flow')" class="glass p-5 rounded-2xl text-teal-400 border-teal-500/20 font-black uppercase tracking-widest text-[10px]">Flow / Productive</button>
            <button onclick="recordMeta('Rest')" class="glass p-5 rounded-2xl text-purple-400 border-purple-500/20 font-black uppercase tracking-widest text-[10px]">Rest / Prolactin</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        // --- Persistence & Spirit Data ---
        const STATS_KEY = 'spirit_path_stats';
        const LEGACY_STATS_KEY = 'shatterpoint_stats';
        let stats = JSON.parse(localStorage.getItem(STATS_KEY) || localStorage.getItem(LEGACY_STATS_KEY)) || { level: 1, total: 0 };
        let metaLog = JSON.parse(localStorage.getItem('spirit_path_meta')) || [];
        
        const SPIRIT_THEMES = [
            { name: "OSPREY", color: "#2dd4bf", freq: 110, scale: 9, path: (t) => ({ x: 16 * Math.pow(Math.sin(t), 3), y: -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) }) },
            { name: "BEAR", color: "#fbbf24", freq: 85, scale: 15, path: (t) => ({ x: 10 * Math.cos(t) + 3 * Math.cos(6*t), y: 12 * Math.sin(t) - 2 * Math.sin(3*t) }) },
            { name: "SALMON", color: "#38bdf8", freq: 140, scale: 13, path: (t) => ({ x: 18 * Math.cos(t) * Math.sin(t * 1.5), y: 8 * Math.sin(t) + 4 * Math.cos(t * 4) }) },
            { name: "ORCA", color: "#f8fafc", freq: 65, scale: 16, path: (t) => { const r = 12 * (1 + Math.sin(t)); return { x: r * Math.cos(t) * (1 + 0.5 * Math.cos(t * 3)), y: r * Math.sin(t) - (t > Math.PI ? 8 : 0) }; } }
        ];

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        let fragments = [], glitches = [], stars = [], totemPoints = [];
        let isPaused = true, mode = 0, speedMult = 0.04;
        let timeLeft = 120, lastJump = 0, emdrAngle = 0;
        let audioCtx, panner, cedarOsc, drumInt;
        let audioReady = false;

        // --- UI Initialization ---
        document.getElementById('dash-level').innerText = `LVL ${stats.level}`;
        document.getElementById('dash-total').innerText = stats.total;

        const slider = document.getElementById('speed-slider');
        slider.addEventListener('input', (e) => {
            speedMult = parseFloat(e.target.value);
            if (!isPaused && audioReady) startDrum();
        });

        // --- Geometry & Audio ---
        function generateTotem() {
            totemPoints = [];
            const theme = SPIRIT_THEMES[Math.floor((stats.level - 1) / 5) % 4];
            for (let i = 0; i < 1500; i++) {
                const t = (i / 1500) * Math.PI * 2;
                const pos = theme.path(t);
                totemPoints.push({ x: pos.x * theme.scale + canvas.width/2, y: pos.y * theme.scale + canvas.height/2 });
            }
            updateThemeUI(theme);
        }

        function updateThemeUI(theme) {
            document.getElementById('intro-title').style.color = theme.color;
            document.getElementById('dash-level').style.color = theme.color;
            document.getElementById('timer-display').style.color = theme.color;
            document.getElementById('active-level').innerText = `${theme.name} | Rank ${stats.level}`;
            document.getElementById('active-level').style.color = theme.color;
            slider.style.accentColor = theme.color;
        }

        function initAudio() {
            if (audioReady) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            panner = audioCtx.createStereoPanner ? audioCtx.createStereoPanner() : audioCtx.createGain();
            panner.connect(audioCtx.destination);
            
            cedarOsc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            const theme = SPIRIT_THEMES[Math.floor((stats.level - 1) / 5) % 4];
            cedarOsc.frequency.setValueAtTime(theme.freq, audioCtx.currentTime);
            g.gain.value = 0.06;
            cedarOsc.connect(g).connect(panner);
            cedarOsc.start();
            audioReady = true;
            startDrum();
        }

        function playDrum() {
            if (!audioReady) return;
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            const theme = SPIRIT_THEMES[Math.floor((stats.level - 1) / 5) % 4];
            o.frequency.setValueAtTime(theme.freq * 0.8, audioCtx.currentTime);
            o.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            g.gain.setValueAtTime(0.3, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            o.connect(g).connect(panner);
            o.start(); o.stop(audioCtx.currentTime + 0.15);
        }

        function startDrum() {
            if (!audioReady) return;
            if (drumInt) clearInterval(drumInt);
            const tempo = 1100 - (speedMult * 10000);
            drumInt = setInterval(() => {
                if (mode === 3) return;
                playDrum();
                setTimeout(() => playDrum(), tempo / 3);
            }, tempo);
        }

        // --- Core Engine ---
        class Fragment {
            constructor(x, y) {
                this.x = x; this.y = y;
                const target = totemPoints[Math.floor(Math.random()*totemPoints.length)];
                this.tx = target.x; this.ty = target.y;
                this.vx = (Math.random()-0.5)*55; this.vy = (Math.random()-0.5)*55;
                this.isHome = false;
            }
            update() {
                if(!this.isHome) {
                    this.x += this.vx; this.y += this.vy; this.vx *= 0.86; this.vy *= 0.86;
                    if(Math.abs(this.vx) < 0.5) { this.x += (this.tx-this.x)*0.15; this.y += (this.ty-this.y)*0.15; }
                    if(Math.abs(this.x-this.tx) < 2) this.isHome = true;
                }
            }
            draw(color) {
                ctx.fillStyle = this.isHome ? `${color}44` : color;
                ctx.fillRect(this.x, this.y, 2, 2);
            }
        }

        class Glitch {
            constructor() { this.spawn(); }
            spawn() {
                if(mode === 2) { 
                    this.x = Math.random()*(canvas.width-120)+60; 
                    this.y = Math.random()*(canvas.height-120)+60;
                    lastJump = Date.now();
                } else {
                    const a = Math.random()*Math.PI*2;
                    this.x = canvas.width/2 + Math.cos(a)*canvas.width;
                    this.y = canvas.height/2 + Math.sin(a)*canvas.width;
                }
            }
            update() {
                if(mode === 1) { 
                    emdrAngle += speedMult;
                    this.x = canvas.width/2 + Math.sin(emdrAngle)*(canvas.width*0.42);
                    this.y = canvas.height/2;
                    if (panner && panner.pan && audioCtx) {
                        panner.pan.setTargetAtTime((this.x/canvas.width)*2-1, audioCtx.currentTime, 0.1);
                    }
                } else if(mode === 2) { 
                    if(Date.now()-lastJump > 650) this.spawn();
                } else {
                    const dx = canvas.width/2 - this.x, dy = canvas.height/2 - this.y;
                    const d = Math.sqrt(dx*dx+dy*dy);
                    this.x += (dx/d)*4.5; this.y += (dy/d)*4.5;
                }
            }
            draw() {
                ctx.strokeStyle = "#f43f5e"; ctx.lineWidth = 4;
                ctx.strokeRect(this.x-14, this.y-14, 28, 28);
            }
        }

        function animate() {
            const theme = SPIRIT_THEMES[Math.floor((stats.level - 1) / 5) % 4];
            ctx.fillStyle = mode === 3 ? "#020617" : "#080c18";
            ctx.fillRect(0,0,canvas.width,canvas.height);

            if(!isPaused) {
                stars.forEach(s => {
                    let speed = mode === 2 ? 6 : (mode === 3 ? 0.35 : 1.8);
                    s.z -= speed; if(s.z<=0) s.z=canvas.width;
                    const sx = (s.x*(canvas.width/s.z))+canvas.width/2;
                    const sy = (s.y*(canvas.width/s.z))+canvas.height/2;
                    const alpha = Math.max(0, Math.min(1, 1 - s.z/canvas.width));
                    ctx.fillStyle = mode === 2 ? `rgba(244,63,94,${alpha})` : `rgba(${parseInt(theme.color.slice(1,3),16)}, ${parseInt(theme.color.slice(3,5),16)}, ${parseInt(theme.color.slice(5,7),16)}, ${alpha})`;
                    ctx.beginPath(); ctx.arc(sx, sy, s.s*(canvas.width/s.z), 0, Math.PI*2); ctx.fill();
                });
                fragments.forEach(f => { f.update(); f.draw(theme.color); });
                if(mode !== 3) {
                    if(glitches.length < 1) glitches.push(new Glitch());
                    glitches.forEach(g => { g.update(); g.draw(); });
                }
            }
            requestAnimationFrame(animate);
        }

        // --- App Handlers ---
        function startApp() {
            try {
                initAudio();
            } catch (err) {
                console.warn('Audio initialization failed:', err);
            }
            document.getElementById('intro-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro-overlay').style.display = 'none';
                document.getElementById('hud').style.opacity = '1';
                document.getElementById('controls').style.opacity = '1';
                isPaused = false;
            }, 800);
            const timer = setInterval(() => { 
                if(!isPaused && timeLeft > 0) { timeLeft--; updateHUD(); }
                if(timeLeft <= 0) { clearInterval(timer); endSession(); }
            }, 1000);
        }

        function updateHUD() {
            const m = Math.floor(timeLeft/60), s = timeLeft%60;
            document.getElementById('timer-display').innerText = `${m}:${s.toString().padStart(2,'0')}`;
        }

        function endSession() {
            isPaused = true;
            if(drumInt) clearInterval(drumInt);
            document.getElementById('meta-overlay').classList.remove('opacity-0', 'pointer-events-none');
        }

        function recordMeta(state) {
            metaLog.push({ time: new Date().toISOString(), lvl: stats.level, spirit: SPIRIT_THEMES[Math.floor((stats.level-1)/5)%4].name, state: state });
            localStorage.setItem('spirit_path_meta', JSON.stringify(metaLog));
            location.reload();
        }

        function cycleMode() {
            mode = (mode + 1) % 4;
            const btn = document.getElementById('mode-btn');
            const labels = ["Mode: STANDARD", "Mode: EMDR", "Mode: SACCADIC", "Mode: ZEN"];
            btn.innerText = labels[mode];
            btn.style.color = mode === 2 ? "#f43f5e" : "#2dd4bf";
            glitches = [];
            if (panner && panner.pan && audioCtx && mode !== 1) {
                panner.pan.setTargetAtTime(0, audioCtx.currentTime, 0.5);
            }
        }

        function handleInput(e) {
            if(isPaused || mode === 3) return;
            const x = e.clientX || (e.touches && e.touches[0].clientX);
            const y = e.clientY || (e.touches && e.touches[0].clientY);
            glitches.forEach((g, i) => {
                if(Math.sqrt((x-g.x)**2 + (y-g.y)**2) < 70) {
                    if("vibrate" in navigator) navigator.vibrate(25);
                    glitches.splice(i, 1); stats.total++;
                    for(let j=0; j<40; j++) fragments.push(new Fragment(g.x, g.y));
                    if(stats.total % 25 === 0) { stats.level++; generateTotem(); }
                    localStorage.setItem(STATS_KEY, JSON.stringify(stats));
                    document.getElementById('dash-total').innerText = stats.total;
                    document.getElementById('dash-level').innerText = `LVL ${stats.level}`;
                }
            });
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        window.addEventListener('mousedown', handleInput);
        window.addEventListener('touchstart', (e) => { handleInput(e); e.preventDefault(); }, {passive: false});
        for (let i = 0; i < 150; i++) stars.push({ x: Math.random()*canvas.width-canvas.width/2, y: Math.random()*canvas.height-canvas.height/2, z: Math.random()*canvas.width, s: Math.random()*2.5 });
        generateTotem(); animate();
    </script>
</body>
</html>
